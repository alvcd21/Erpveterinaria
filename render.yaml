services:
  - type: web
    name: erpveterinaria
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: SAAS_SUPER_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
  - type: static
    name: erpveterinaria-admin
    rootDir: apps/Erpveterinaria-admin
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
